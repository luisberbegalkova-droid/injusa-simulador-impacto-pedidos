<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Simulador impacto pedidos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --border: #e5e7eb;
      --dark: #111827;
      --ok: #027a48;
      --warn: #b54708;
      --bad: #b42318;
      --soft-ok: #ecfdf3;
      --soft-bad: #fef3f2;
      --soft-warn: #fffaeb;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 14px rgba(16, 24, 40, 0.04);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 2fr 1fr 2fr auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #344054;
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d0d5dd;
      border-radius: 9px;
      padding: 10px 11px;
      font-size: 14px;
      background: white;
    }

    textarea {
      min-height: 42px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 9px;
      padding: 11px 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--dark);
      color: white;
    }

    button.secondary {
      background: #ffffff;
      color: var(--dark);
      border: 1px solid #d0d5dd;
    }

    button.danger {
      background: #b42318;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      display: none;
    }

    .status.ok {
      display: block;
      color: var(--ok);
      background: var(--soft-ok);
    }

    .status.error {
      display: block;
      color: var(--bad);
      background: var(--soft-bad);
    }

    .status.loading {
      display: block;
      color: var(--warn);
      background: var(--soft-warn);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fcfcfd;
    }

    .metric small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 24px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 980px;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid #eaecf0;
      padding: 9px 10px;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #344054;
      font-size: 12px;
      position: sticky;
      top: 0;
    }

    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .sev-ALTA, .sev-CRITICA {
      color: var(--bad);
      background: var(--soft-bad);
    }

    .sev-MEDIA {
      color: var(--warn);
      background: var(--soft-warn);
    }

    .sev-BAJA {
      color: var(--ok);
      background: var(--soft-ok);
    }

    .line-row {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fcfcfd;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    @media (max-width: 900px) {
      body {
        padding: 14px;
      }

      .grid,
      .metrics {
        grid-template-columns: 1fr;
      }

      .grid-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Simulador impacto pedidos</h1>
    <p class="subtitle">
      Simula qué pedidos y líneas se ven afectados al reservar stock para un pedido prioritario.
    </p>

    <div id="status" class="status"></div>

    <div class="card">
      <h2>Datos del escenario</h2>

      <div class="grid">
        <div>
          <label>Cliente prioritario</label>
          <input id="cliente" placeholder="Ej: CLIENTE VIP">
        </div>

        <div>
          <label>Pedido / referencia</label>
          <input id="pedido" placeholder="Ej: VIP-001">
        </div>

        <div>
          <label>Usuario</label>
          <input id="usuario" placeholder="Ej: Luis" value="webapp">
        </div>

        <div>
          <label>Prioridad</label>
          <select id="prioridad">
            <option value="ALTA">ALTA</option>
            <option value="MEDIA">MEDIA</option>
            <option value="BAJA">BAJA</option>
          </select>
        </div>
      </div>

      <div style="margin-top:14px;">
        <label>Comentario</label>
        <textarea id="comentario" placeholder="Comentario opcional"></textarea>
      </div>
    </div>

    <div class="card">
      <h2>Líneas prioritarias</h2>

      <div id="lineas"></div>

      <div class="actions">
        <button class="secondary" onclick="addLinea()">+ Añadir línea</button>
        <button onclick="simular()" id="btnSimular">Simular impacto</button>
      </div>
    </div>

    <div id="resultado"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxynxAfig1spIHYDKLjSMfSosSxLYTEQPkmy9eKjVBV05KPmHmSCpwbq6Gh1CC51Wlk/exec';

    let lineCounter = 0;

    document.addEventListener('DOMContentLoaded', () => {
      addLinea('1003', '50');
    });

    function addLinea(idArticulo = '', cantidad = '', descripcion = '') {
      lineCounter += 1;

      const div = document.createElement('div');
      div.className = 'line-row';
      div.dataset.lineId = lineCounter;

      div.innerHTML = `
        <div class="grid-3">
          <div>
            <label>ID artículo</label>
            <input class="id-articulo" placeholder="Ej: 1003" value="${escAttr(idArticulo)}">
          </div>

          <div>
            <label>Cantidad</label>
            <input class="cantidad" type="number" min="1" placeholder="Ej: 50" value="${escAttr(cantidad)}">
          </div>

          <div>
            <label>Descripción opcional</label>
            <input class="descripcion" placeholder="Opcional" value="${escAttr(descripcion)}">
          </div>

          <div>
            <button class="danger" onclick="removeLinea(${lineCounter})">Eliminar</button>
          </div>
        </div>
      `;

      document.getElementById('lineas').appendChild(div);
    }

    function removeLinea(lineId) {
      const rows = document.querySelectorAll('.line-row');

      if (rows.length <= 1) {
        showStatus('Debe haber al menos una línea.', 'error');
        return;
      }

      const el = document.querySelector(`[data-line-id="${lineId}"]`);
      if (el) el.remove();
    }

    function getPayload() {
      const cliente = document.getElementById('cliente').value.trim();
      const pedido = document.getElementById('pedido').value.trim();
      const usuario = document.getElementById('usuario').value.trim();
      const prioridad = document.getElementById('prioridad').value;
      const comentario = document.getElementById('comentario').value.trim();

      const lineas = [...document.querySelectorAll('.line-row')].map(row => {
        return {
          id_articulo: row.querySelector('.id-articulo').value.trim(),
          cantidad: Number(row.querySelector('.cantidad').value || 0),
          descripcion: row.querySelector('.descripcion').value.trim(),
        };
      }).filter(l => l.id_articulo && l.cantidad > 0);

      return {
        cliente,
        pedido,
        usuario,
        prioridad,
        comentario,
        lineas,
      };
    }

    function simular() {
      const payload = getPayload();

      if (!payload.lineas.length) {
        showStatus('Introduce al menos una línea con ID artículo y cantidad.', 'error');
        return;
      }

      document.getElementById('btnSimular').disabled = true;
      document.getElementById('resultado').innerHTML = '';
      showStatus('Calculando simulación...', 'loading');

      jsonp(API_URL, {
        action: 'simulate',
        payload: JSON.stringify(payload),
      }, data => {
        document.getElementById('btnSimular').disabled = false;

        if (!data.ok) {
          showStatus(data.error || 'Error desconocido en la simulación.', 'error');
          console.error(data);
          return;
        }

        showStatus('Simulación calculada correctamente.', 'ok');
        renderResultado(data);
      });
    }

    function renderResultado(data) {
      const pedidos = data.impacto_pedidos || [];
      const lineas = data.impacto_lineas || [];
      const resumen = data.resumen || {};

      let html = `
        <div class="card">
          <h2>Resumen</h2>

          <div class="metrics">
            <div class="metric">
              <small>Escenario</small>
              <strong style="font-size:16px;">${esc(data.escenario_id)}</strong>
            </div>

            <div class="metric">
              <small>Líneas priorizadas</small>
              <strong>${fmt(resumen.total_lineas_priorizadas)}</strong>
            </div>

            <div class="metric">
              <small>Pedidos afectados</small>
              <strong>${fmt(pedidos.length)}</strong>
            </div>

            <div class="metric">
              <small>Líneas afectadas</small>
              <strong>${fmt(lineas.length)}</strong>
            </div>
          </div>
        </div>
      `;

      html += renderImpactoLineas(lineas);
      html += renderImpactoPedidos(pedidos);

      document.getElementById('resultado').innerHTML = html;
    }

    function renderImpactoLineas(lineas) {
      let html = `
        <div class="card">
          <h2>Impacto por línea / artículo</h2>
      `;

      if (!lineas.length) {
        html += `<p>No hay líneas afectadas por este escenario.</p></div>`;
        return html;
      }

      html += `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Prioridad</th>
                <th>Pedido</th>
                <th>Cliente</th>
                <th>Artículo</th>
                <th>Descripción</th>
                <th>Cant. pendiente</th>
                <th>Stock antes base</th>
                <th>Stock antes sim.</th>
                <th>Faltante base</th>
                <th>Faltante sim.</th>
                <th>Impacto</th>
                <th>Severidad</th>
              </tr>
            </thead>
            <tbody>
      `;

      lineas.forEach(r => {
        html += `
          <tr>
            <td>${fmt(r.prioridad_atlas)}</td>
            <td>${esc(r.document_no)}</td>
            <td>${esc(r.cliente)}</td>
            <td><strong>${esc(r.id_articulo)}</strong></td>
            <td>${esc(r.descripcion)}</td>
            <td>${fmt(r.cantidad_pendiente)}</td>
            <td>${fmt(r.stock_antes_base)}</td>
            <td>${fmt(r.stock_antes_simulado)}</td>
            <td>${fmt(r.cantidad_faltante_base)}</td>
            <td>${fmt(r.cantidad_faltante_simulada)}</td>
            <td><strong>${fmt(r.impacto_linea)}</strong></td>
            <td><span class="pill sev-${esc(r.severidad)}">${esc(r.severidad)}</span></td>
          </tr>
        `;
      });

      html += `
            </tbody>
          </table>
        </div>
      </div>`;

      return html;
    }

    function renderImpactoPedidos(pedidos) {
      let html = `
        <div class="card">
          <h2>Impacto por pedido completo</h2>
      `;

      if (!pedidos.length) {
        html += `<p>No hay pedidos afectados por este escenario.</p></div>`;
        return html;
      }

      html += `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Prioridad</th>
                <th>Pedido</th>
                <th>Cliente</th>
                <th>Fecha envío</th>
                <th>Estado base</th>
                <th>Estado simulado</th>
                <th>Faltante base</th>
                <th>Faltante simulado</th>
                <th>Impacto</th>
                <th>Tipo impacto</th>
                <th>Severidad</th>
              </tr>
            </thead>
            <tbody>
      `;

      pedidos.forEach(r => {
        html += `
          <tr>
            <td>${fmt(r.prioridad)}</td>
            <td>${esc(r.id_pedido)}</td>
            <td>${esc(r.cliente)}</td>
            <td>${esc(formatDateLike(r.fecha_envio))}</td>
            <td>${esc(r.estado_base)}</td>
            <td>${esc(r.estado_simulado)}</td>
            <td>${fmt(r.cantidad_faltante_base)}</td>
            <td>${fmt(r.cantidad_faltante_simulada)}</td>
            <td><strong>${fmt(r.impacto_cantidad_faltante)}</strong></td>
            <td>${esc(r.impacto_estado)}</td>
            <td><span class="pill sev-${esc(r.severidad)}">${esc(r.severidad)}</span></td>
          </tr>
        `;
      });

      html += `
            </tbody>
          </table>
        </div>
      </div>`;

      return html;
    }

    function jsonp(url, params, callback) {
      const callbackName = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);

      window[callbackName] = function(data) {
        delete window[callbackName];
        script.remove();
        callback(data);
      };

      const query = new URLSearchParams({
        ...params,
        callback: callbackName,
      });

      const script = document.createElement('script');
      script.src = url + '?' + query.toString();

      script.onerror = function() {
        document.getElementById('btnSimular').disabled = false;
        showStatus('Error llamando a Apps Script. Revisa la URL o el despliegue.', 'error');
      };

      document.body.appendChild(script);
    }

    function showStatus(message, type) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = message;
    }

    function fmt(value) {
      const n = Number(value || 0);

      if (!isFinite(n)) return '0';

      return n.toLocaleString('es-ES', {
        maximumFractionDigits: 2,
      });
    }

    function esc(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escAttr(value) {
      return esc(value).replaceAll('\n', ' ');
    }

    function formatDateLike(value) {
      if (!value) return '';

      if (typeof value === 'string') return value;

      return String(value);
    }
  </script>
</body>
</html>
